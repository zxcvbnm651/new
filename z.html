<!DOCTYPE html>
<html class="f">
    <head>
        <meta charset=UTF-8>
        <title>我是一个标题</title>
        <link rel="stylesheet" href="dz.css">
        <style>
          h1 {
            color: red;
            font: 100px 微软雅黑;
          }
          h2 {
            font-size: 50px;
            animation: c 5s ease forwards;
            color: red;

          }
                     @keyframes c {
  0% {
    font-size: 16px;
  }
  50% {
    font-size: 100px;
    font-weight: 1000;
    transform: translate(150px,100px);
  }
  100%{
    transform: translate(0px,0px);
  }
} 
a {
  color: red;
  font-size: 40px;
}
        </style>
    </head>
    <body>
      <h1 class="f">周锦扬生日快乐</h1>
      <h2>Happy birthday to you!!!</h2>
      <p><a href="生日歌.mp3">生日歌</a></p>
    </body>
</html>
